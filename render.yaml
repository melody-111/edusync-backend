services:
  - type: web
    name: digital-classroom-backend
    runtime: docker
    plan: free
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CLIENT_URL
        value: https://your-frontend-domain.com
      # Database (Update with production MongoDB URI)
      - key: MONGODB_URI
        value: mongodb+srv://Divyansh:Divyansh@trial.qjmankx.mongodb.net/digital_classroom?retryWrites=true&w=majority
      # Redis (Use Render Redis addon for production)
      - key: REDIS_HOST
        value: redis-10774.c263.us-east-1-2.ec2.cloud.redislabs.com
      - key: REDIS_PORT
        value: "10774"
      - key: REDIS_PASSWORD
        value: tNwhDw2V0k2CB7XCEADBGZELfe9DUkVH
      # JWT Secrets
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: JWT_REFRESH_EXPIRES_IN
        value: 30d
      # OTP & QR Secrets
      - key: OTP_SECRET
        generateValue: true
      - key: QR_SECRET
        generateValue: true
      # Google OAuth
      - key: GOOGLE_CLIENT_ID
        value: your_google_client_id
      - key: GOOGLE_CLIENT_SECRET
        value: your_google_client_secret
      - key: GOOGLE_CALLBACK_URL
        value: https://edusync-backend-4.onrender.com/auth/google/callback
      # Email SMTP
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "false"
      - key: SMTP_USER
        value: sudhanshusonkar210@gmail.com
      - key: SMTP_PASS
        value: "lscs qhdo xrxd ngdp"
      - key: EMAIL_FROM
        value: "Digital Classroom <noreply@classroom.app>"
      # AI API
      - key: AI_API_KEY
        value: your_ai_api_key
      - key: AI_API_BASE_URL
        value: https://api.openai.com/v1
      - key: AI_MODEL
        value: gpt-4o
      # YouTube API
      - key: YOUTUBE_API_KEY
        value: your_youtube_api_key
      # Firebase (Push Notifications)
      - key: FIREBASE_SERVICE_ACCOUNT_PATH
        value: ./firebase-service-account.json
      # File Storage
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_FILE_SIZE
        value: "52428800"
      - key: PDF_STORAGE_DIR
        value: exports/pdfs
      # Rate Limiting
      - key: RATE_LIMIT_WINDOW_MS
        value: "900000"
      - key: RATE_LIMIT_MAX
        value: "100"
      # Socket.io
      - key: SOCKET_CORS_ORIGIN
        value: https://your-frontend-domain.com
